<svg width="1120" height="700" viewBox="0 0 1120 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mapa do ecossistema de projetos de Bruno Mafra</title>
  <desc id="desc">TemAi no centro, LaunchKit como crescimento, Sabore como operação comercial, SplitMate como organização financeira e uma base técnica com Next.js, TypeScript, Supabase, APIs e IA aplicada.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.56" stop-color="#102033"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="temai" x1="330" y1="245" x2="790" y2="455" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="700" rx="28" fill="url(#bg)"/>
  <path d="M54 94H1066" stroke="#1e293b" stroke-width="2"/>
  <path d="M54 588H1066" stroke="#1e293b" stroke-width="2"/>

  <text x="54" y="58" fill="#f8fafc" font-family="Arial, sans-serif" font-size="32" font-weight="800">Ecossistema de projetos</text>
  <text x="54" y="86" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Como os projetos se conectam entre produto, crescimento, operação e dados</text>

  <g opacity="0.55" stroke="#334155" stroke-width="2">
    <path d="M560 350 L222 197"/>
    <path d="M560 350 L898 197"/>
    <path d="M560 350 L898 508"/>
    <path d="M560 350 L222 508"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="329" y="242" width="462" height="220" rx="22" fill="url(#temai)"/>
    <text x="374" y="292" fill="#062019" font-family="Arial, sans-serif" font-size="18" font-weight="900">PROJETO PRINCIPAL</text>
    <text x="374" y="340" fill="#04111d" font-family="Arial, sans-serif" font-size="48" font-weight="900">TemAi</text>
    <text x="374" y="376" fill="#0f172a" font-family="Arial, sans-serif" font-size="19" font-weight="700">Receitas com IA, mobile-first, Supabase</text>
    <text x="374" y="407" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">Sugestões por ingredientes, receita sob demanda,</text>
    <text x="374" y="430" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">biblioteca, perfil e base para recursos premium.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="54" y="130" width="322" height="150" rx="20" fill="#111827" stroke="#38bdf8"/>
    <text x="82" y="164" fill="#38bdf8" font-family="Arial, sans-serif" font-size="14" font-weight="900">CRESCIMENTO ORGÂNICO</text>
    <text x="82" y="203" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="900">LaunchKit</text>
    <text x="82" y="235" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Campanhas, roteiros, carrosséis,</text>
    <text x="82" y="258" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">prompts e assets para divulgar apps.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="744" y="130" width="322" height="150" rx="20" fill="#111827" stroke="#facc15"/>
    <text x="772" y="164" fill="#facc15" font-family="Arial, sans-serif" font-size="14" font-weight="900">OPERAÇÃO COMERCIAL</text>
    <text x="772" y="203" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="900">Sabore PDV</text>
    <text x="772" y="235" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Pedidos, caixa, estoque, CMV,</text>
    <text x="772" y="258" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">ficha técnica e módulos opcionais.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="744" y="420" width="322" height="150" rx="20" fill="#111827" stroke="#fb7185"/>
    <text x="772" y="454" fill="#fb7185" font-family="Arial, sans-serif" font-size="14" font-weight="900">ORGANIZAÇÃO FINANCEIRA</text>
    <text x="772" y="493" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="900">SplitMate</text>
    <text x="772" y="525" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Divisão de despesas, grupos,</text>
    <text x="772" y="548" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">autenticação e dados persistentes.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="54" y="420" width="322" height="150" rx="20" fill="#111827" stroke="#a78bfa"/>
    <text x="82" y="454" fill="#a78bfa" font-family="Arial, sans-serif" font-size="14" font-weight="900">BASE TÉCNICA</text>
    <text x="82" y="493" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="900">Stack</text>
    <text x="82" y="525" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Next.js, TypeScript, Supabase,</text>
    <text x="82" y="548" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">API Routes, Tailwind e IA aplicada.</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" font-weight="900">
    <rect x="405" y="606" width="122" height="34" rx="17" fill="#052e2b"/>
    <text x="430" y="628" fill="#34d399">demo ativa</text>
    <rect x="541" y="606" width="132" height="34" rx="17" fill="#172554"/>
    <text x="564" y="628" fill="#38bdf8">produto real</text>
    <rect x="687" y="606" width="152" height="34" rx="17" fill="#3b0764"/>
    <text x="710" y="628" fill="#d8b4fe">em evolução</text>
  </g>
</svg>
