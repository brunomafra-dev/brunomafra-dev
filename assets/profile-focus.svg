<svg width="980" height="360" viewBox="0 0 980 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gráfico de foco atual de Bruno Mafra</title>
  <desc id="desc">Distribuição visual dos principais focos: Back-End e APIs, IA aplicada, Full-stack, Produto e documentação.</desc>
  <rect width="980" height="360" rx="18" fill="#0f172a"/>
  <path d="M0 78H980" stroke="#1e293b"/>
  <path d="M0 282H980" stroke="#1e293b"/>
  <text x="42" y="52" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">Foco atual</text>
  <text x="42" y="88" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Onde estou concentrando energia nos projetos públicos</text>

  <g font-family="Arial, sans-serif" font-size="15" font-weight="700">
    <text x="42" y="143" fill="#e2e8f0">Back-End e APIs</text>
    <rect x="214" y="125" width="690" height="24" rx="12" fill="#1e293b"/>
    <rect x="214" y="125" width="622" height="24" rx="12" fill="#38bdf8"/>

    <text x="42" y="188" fill="#e2e8f0">IA aplicada</text>
    <rect x="214" y="170" width="690" height="24" rx="12" fill="#1e293b"/>
    <rect x="214" y="170" width="566" height="24" rx="12" fill="#34d399"/>

    <text x="42" y="233" fill="#e2e8f0">Full-stack</text>
    <rect x="214" y="215" width="690" height="24" rx="12" fill="#1e293b"/>
    <rect x="214" y="215" width="524" height="24" rx="12" fill="#facc15"/>

    <text x="42" y="278" fill="#e2e8f0">Produto e UX</text>
    <rect x="214" y="260" width="690" height="24" rx="12" fill="#1e293b"/>
    <rect x="214" y="260" width="469" height="24" rx="12" fill="#fb7185"/>

    <text x="42" y="323" fill="#e2e8f0">Documentação</text>
    <rect x="214" y="305" width="690" height="24" rx="12" fill="#1e293b"/>
    <rect x="214" y="305" width="442" height="24" rx="12" fill="#a78bfa"/>
  </g>
</svg>
